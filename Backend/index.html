<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portafolio Escolar</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card: #21253a;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --text: #e8e9f0;
      --muted: #8b8fa8;
      --border: #2e3250;
      --success: #4ade80;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .hero {
      background: linear-gradient(135deg, #0f1117 0%, #1a1230 50%, #0f1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 60px 40px 50px;
      position: relative;
      overflow: hidden;
    }

    .hero-inner { max-width: 760px; margin: 0 auto; position: relative; }

    .eyebrow { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent2); font-weight: 500; margin-bottom: 18px; }

    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 700; line-height: 1.15; color: var(--text); margin-bottom: 24px; }

    .hero h1 span { background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .badges { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }

    .badge { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; font-size: 13px; }

    .badge-icon { width: 18px; height: 18px; opacity: 0.7; }

    .badge-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }

    .badge-value { color: var(--text); font-weight: 500; }

    .main { max-width: 760px; margin: 0 auto; padding: 48px 40px 80px; }

    .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }

    .section-title { font-size: 13px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); font-weight: 600; }

    .section-line { flex: 1; height: 1px; background: var(--border); }

    #lista-tareas { display: flex; flex-direction: column; gap: 12px; }

    .tarea-card { display: flex; align-items: center; gap: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; text-decoration: none; color: inherit; transition: border-color 0.2s, background 0.2s, transform 0.15s; cursor: pointer; }

    .tarea-card:hover { border-color: var(--accent); background: var(--card); transform: translateX(4px); }

    .tarea-num { font-size: 11px; font-weight: 700; color: var(--accent2); min-width: 28px; font-family: monospace; letter-spacing: 1px; }

    .tarea-info { flex: 1; }

    .tarea-titulo { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }

    .tarea-url { font-size: 12px; color: var(--muted); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 400px; }

    .tarea-arrow { color: var(--accent); font-size: 18px; opacity: 0; transition: opacity 0.2s, transform 0.2s; }

    .tarea-card:hover .tarea-arrow { opacity: 1; transform: translateX(3px); }

    .status { display: flex; align-items: center; gap: 10px; padding: 20px 24px; border-radius: 12px; font-size: 14px; }

    .status.loading { background: var(--surface); border: 1px dashed var(--border); color: var(--muted); }

    .status.error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3); color: #f87171; }

    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer { text-align: center; padding: 24px; border-top: 1px solid var(--border); color: var(--muted); font-size: 12px; }

    .dot { display: inline-block; width: 6px; height: 6px; background: var(--success); border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  </style>
</head>
<body>

  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">Portafolio Académico · Semestre 2026</p>
      <h1>Keyson<br /><span>Lugo</span></h1>
      <div class="badges">
        <div class="badge">
          <svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <div><div class="badge-label">Matrícula</div><div class="badge-value">24040866</div></div>
        </div>
        <div class="badge">
          <svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/>
          </svg>
          <div><div class="badge-label">Grupo</div><div class="badge-value">ISOF 03</div></div>
        </div>
        <div class="badge">
          <svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
          </svg>
          <div><div class="badge-label">Materia</div><div class="badge-value">Desarrollo Web</div></div>
        </div>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="section-header">
      <span class="section-title">Tareas del Semestre</span>
      <div class="section-line"></div>
    </div>

    <div id="lista-tareas">
      <div class="status loading">
        <div class="spinner"></div>
        Cargando tareas desde la base de datos…
      </div>
    </div>
  </main>

  <footer>
    <span class="dot"></span>API conectada · MySQL · Node.js + Express
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const contenedor = document.getElementById('lista-tareas');

      fetch('/tareas')
        .then(response => response.json())
        .then(data => {
          contenedor.innerHTML = ''; // Limpiamos el loading
          
          data.forEach((tarea, index) => {
            const a = document.createElement('a');
            a.className = 'tarea-card';
            a.href = tarea.url || '#';
            a.target = '_blank';
            
            a.innerHTML = `
              <div class="tarea-num">${index + 1}</div>
              <div class="tarea-info">
                <div class="tarea-titulo">${tarea.titulo}</div>
                <div class="tarea-url">${tarea.url}</div>
              </div>
              <div class="tarea-arrow">→</div>
            `;
            
            contenedor.appendChild(a);
          });
        })
        .catch(error => {
          console.error('Error:', error);
          contenedor.innerHTML = '<div class="status error">Error al cargar tareas.</div>';
        });
    });
  </script>
</body>
</html>
